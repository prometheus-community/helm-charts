name: Chart Bug Report
description: Report a bug in a Helm chart
title: "[name of the chart e.g. prometheus-couchdb-exporter] Issue Title"
labels: [bug]
assignees:
  -
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be cautious with the sensitive information/logs while filing the issue.

  - type: textarea
    id: desc
    attributes:
      label: Describe the bug a clear and concise description of what the bug is.
    validations:
      required: true

  - type: input
    id: helm-version
    attributes:
      label: What's your helm version?
      description: Enter the output of `$ helm version`
      placeholder: Copy paste the entire output of the above
    validations:
      required: true

  - type: input
    id: kubectl-version
    attributes:
      label: What's your kubectl version?
      description: Enter the output of `$ kubectl version`
    validations:
      required: true

  - type: dropdown
    id: chart-name
    attributes:
      label: Which chart?
      description: Select the chart this bug is related to.
      options:
        - alertmanager
        - alertmanager-snmp-notifier
        - jiralert
        - kube-prometheus-stack
        - kube-state-metrics
        - prom-label-proxy
        - prometheus
        - prometheus-adapter
        - prometheus-blackbox-exporter
        - prometheus-cloudwatch-exporter
        - prometheus-conntrack-stats-exporter
        - prometheus-consul-exporter
        - prometheus-couchdb-exporter
        - prometheus-druid-exporter
        - prometheus-elasticsearch-exporter
        - prometheus-fastly-exporter
        - prometheus-ipmi-exporter
        - prometheus-json-exporter
        - prometheus-kafka-exporter
        - prometheus-memcached-exporter
        - prometheus-modbus-exporter
        - prometheus-mongodb-exporter
        - prometheus-mysql-exporter
        - prometheus-nats-exporter
        - prometheus-nginx-exporter
        - prometheus-node-exporter
        - prometheus-operator-admission-webhook
        - prometheus-operator-crds
        - prometheus-pgbouncer-exporter
        - prometheus-pingdom-exporter
        - prometheus-pingmesh-exporter
        - prometheus-postgres-exporter
        - prometheus-pushgateway
        - prometheus-rabbitmq-exporter
        - prometheus-redis-exporter
        - prometheus-smartctl-exporter
        - prometheus-snmp-exporter
        - prometheus-sql-exporter
        - prometheus-stackdriver-exporter
        - prometheus-statsd-exporter
        - prometheus-systemd-exporter
        - prometheus-to-sd
        - prometheus-windows-exporter
        - prometheus-yet-another-cloudwatch-exporter
    validations:
      required: true

  - type: input
    id: chart-version
    attributes:
      label: What's the chart version?
      description: Enter the version of the chart that you encountered this bug.
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Enter exactly what happened.
    validations:
      required: false

  - type: textarea
    id: what-expected
    attributes:
      label: What you expected to happen?
      description: Enter what you expected to happen.
    validations:
      required: false

  - type: textarea
    id: how-to-reproduce
    attributes:
      label: How to reproduce it?
      description: As minimally and precisely as possible.
    validations:
      required: false

  - type: textarea
    id: changed-values
    attributes:
      label: Enter the changed values of values.yaml?
      description: Please enter only values which differ from the defaults. Enter `NONE` if nothing's changed.
      placeholder: 'key: value'
    validations:
      required: false

  - type: textarea
    id: helm-command
    attributes:
      label: Enter the command that you execute and failing/misfunctioning.
      description: Enter the command as-is as how you executed.
      placeholder: helm install my-release prometheus-community/name-of-chart --version version --values values.yaml
    validations:
      required: true

  - type: textarea
    id: anything-else
    attributes:
      label: Anything else we need to know?
    validations:
      required: false
