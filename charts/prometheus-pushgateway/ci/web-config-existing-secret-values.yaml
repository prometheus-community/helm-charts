webConfiguration:
  existingSecret:
    name: pushgateway-web-config

# Provide the referenced Secret in the same release so ct install can schedule
# the pod. The key must be web-config.yaml, the file name Pushgateway expects.
extraManifests:
  - apiVersion: v1
    kind: Secret
    metadata:
      name: pushgateway-web-config
      namespace: '{{ include "prometheus-pushgateway.namespace" . }}'
    type: Opaque
    stringData:
      web-config.yaml: |
        {}
