# Default values for fastly-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

serviceAccount:
  # Specifies whether a ServiceAccount should be created
  create: true
  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

imagePullSecrets: []

image:
  repository: ghcr.io/fastly/fastly-exporter
  # if not set appVersion field from Chart.yaml is used
  tag: ""
  pullPolicy: IfNotPresent

# API token Fastly - https://docs.fastly.com/en/guides/using-api-tokens#creating-api-tokens
fastly:
  token: "token"

# Name of an externally managed secret (in the same namespace) containing the fastly token as key `fastly-api-token`.
# If this is provided, the value token is ignored.
existingSecret:
  name: ""
  key: "fastly-api-token"

nameOverride: ""
fullnameOverride: ""

## Extra manifests to deploy as an array
extraManifests: []
  # - apiVersion: external-secrets.io/v1
  #   kind: ExternalSecret
  #   metadata:
  #     name: fastly-exporter-token
  #   spec:
  #     refreshInterval: 1h
  #     secretStoreRef:
  #       name: example-store
  #       kind: ClusterSecretStore
  #     target:
  #       name: fastly-exporter-token
  #     data:
  #       - secretKey: token
  #         remoteRef:
  #           key: fastly-api-token

# Flags - for a list visit https://github.com/fastly/fastly-exporter#filtering-services
# Repeatable flags accept a list to generate multiple args with the same key.
options:
  {}
  # metric-allowlist='bytes_total$'
  # metric-blocklist=imgopto
  # service:
  #   - example-service-id-1
  #   - example-service-id-2

service:
  type: ClusterIP
  port: 8080
  annotations: {}

ingress:
  enabled: false
  # className: nginx
  annotations: {}
    # kubernetes.io/tls-acme: "true"
  # Legacy format (still supported):
  #   path: /
  #   hosts:
  #     - chart-example.local
  # Modern format (recommended):
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources:
  {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

serviceMonitor:
  # When set true then use a ServiceMonitor to configure scraping
  enabled: false
  # Set the namespace the ServiceMonitor should be deployed
  # namespace: monitoring
  # Set how frequently Prometheus should scrape
  # interval: 30s
  # Set path to fastly-exporter telemtery-path
  # telemetryPath: /metrics
  # Set labels for the ServiceMonitor, use this to define your scrape label for Prometheus Operator
  # labels:
  # Set timeout for scrape
  # timeout: 10s
  # Set of labels to transfer on the Kubernetes Service onto the target.
  # targetLabels: []
  # metricRelabelings: []

podSecurityContext: {}

securityContext: {}

nodeSelector: {}

tolerations: []

affinity: {}

# Extra environment variables
extraEnv: []

# Annotations for the pods
podAnnotations: {}

# Init Containers for Exporter Pod
initContainers: []

# Extra containers for the exporter pod
extraContainers: []

# Extra Volumes for the pod
extraVolumes: []
# - name: example
#   configMap:
#     name: example

# Extra Volume Mounts for the exporter container
extraVolumeMounts: []
# - name: example
#   mountPath: /example

## A HTTPRoute (Gateway API) resource is an alternative to Ingress for routing
## external HTTP traffic to the fastly exporter Service.
## ref: https://gateway-api.sigs.k8s.io/api-types/httproute/
route:
  main:
    ## Enable this route
    enabled: false

    ## ApiVersion set by default to "gateway.networking.k8s.io/v1"
    apiVersion: ""
    ## kind set by default to HTTPRoute
    kind: ""

    ## Optional name for the default rule in the rendered HTTPRoute.
    name: ""

    ## Annotations to attach to the HTTPRoute resource
    annotations: {}
    ## Labels to attach to the HTTPRoute resource
    labels: {}

    ## ParentRefs refers to resources this HTTPRoute is to be attached to (Gateways)
    parentRefs: []
      # - name: contour
      #   sectionName: http

    ## Hostnames (templated) defines a set of hostnames that should match against the HTTP Host
    ## header to select a HTTPRoute used to process the request
    hostnames: []
      # - my.example.com

    ## additionalRules (templated) allows adding custom rules to the route
    additionalRules: []

    ## Filters define the filters that are applied to requests that match
    ## this rule
    filters: []

    ## Matches define conditions used for matching the rule against incoming
    ## HTTP requests
    matches:
      - path:
          type: PathPrefix
          value: /

    ## httpsRedirect adds a filter for redirecting to https (HTTP 301 Moved Permanently).
    ## To redirect HTTP traffic to HTTPS, you need to have a Gateway with both HTTP and HTTPS listeners.
    ## Matches and filters do not take effect if enabled.
    ## Ref. https://gateway-api.sigs.k8s.io/guides/http-redirect-rewrite/
    httpsRedirect: false
