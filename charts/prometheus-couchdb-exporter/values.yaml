# Default values for prometheus-couchdb-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

rbac:
  # Specifies whether RBAC resources should be created
  create: true
  # Specifies whether a PodSecurityPolicy should be created
  pspEnabled: true
serviceAccount:
  # Specifies whether a ServiceAccount should be created
  create: true
  # The name of the ServiceAccount to use.
  # If not set and create is true, a name is generated using the fullname template
  name:

replicaCount: 1

image:
  repository: gesellix/couchdb-prometheus-exporter
  tag: 16
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 9984

ingress:
  enabled: false
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  path: /
  hosts:
    # - chart-example.local
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #  cpu: 100m
  #  memory: 128Mi
  # requests:
  #  cpu: 100m
  #  memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

## CouchDB exporter configurations
couchdb:
  ## URI of the couchdb instance
  uri: http://couchdb.default.svc:5984
  ## Specify the list of databases to get the disk usage stats as comma separates like "db-1,db-2"
  ## or to get stats for every database, please use "_all_dbs"
  databases: _all_dbs
  ## CouchDB username
  # username:
  ## CouchDB Password
  # password:

## A HTTPRoute (Gateway API) resource is an alternative to Ingress for routing
## external HTTP traffic to the couchdb exporter Service.
## ref: https://gateway-api.sigs.k8s.io/api-types/httproute/
route:
  main:
    ## Enable this route
    enabled: false

    ## ApiVersion set by default to "gateway.networking.k8s.io/v1"
    apiVersion: ""
    ## kind set by default to HTTPRoute
    kind: ""

    ## Optional name for the default rule in the rendered HTTPRoute.
    name: ""

    ## Annotations to attach to the HTTPRoute resource
    annotations: {}
    ## Labels to attach to the HTTPRoute resource
    labels: {}

    ## ParentRefs refers to resources this HTTPRoute is to be attached to (Gateways)
    parentRefs: []
      # - name: contour
      #   sectionName: http

    ## Hostnames (templated) defines a set of hostnames that should match against the HTTP Host
    ## header to select a HTTPRoute used to process the request
    hostnames: []
      # - my.example.com

    ## additionalRules (templated) allows adding custom rules to the route
    additionalRules: []

    ## Filters define the filters that are applied to requests that match
    ## this rule
    filters: []

    ## Matches define conditions used for matching the rule against incoming
    ## HTTP requests
    matches:
      - path:
          type: PathPrefix
          value: /

    ## httpsRedirect adds a filter for redirecting to https (HTTP 301 Moved Permanently).
    ## To redirect HTTP traffic to HTTPS, you need to have a Gateway with both HTTP and HTTPS listeners.
    ## Matches and filters do not take effect if enabled.
    ## Ref. https://gateway-api.sigs.k8s.io/guides/http-redirect-rewrite/
    httpsRedirect: false
