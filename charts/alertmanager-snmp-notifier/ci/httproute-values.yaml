## Test case: httproute
snmpNotifier:
  snmpDestinations:
    - 127.0.0.1:162

route:
  main:
    enabled: true
    hostnames:
      - "an.example.com"
    parentRefs:
      - name: contour
    filters:
      - type: RequestHeaderModifier
        requestHeaderModifier:
          set:
            - name: my-header-name
              value: my-new-header-value
    additionalRules:
      - filters:
          - type: RequestHeaderModifier
            requestHeaderModifier:
              remove: ["x-request-id"]
